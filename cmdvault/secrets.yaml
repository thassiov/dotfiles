name: Secrets Management
description: Manage grid.local credentials via 1Password

commands:
  - name: secrets list
    command: grid
    args: ["secrets", "list"]
    description: List all secrets in the vault

  - name: secrets search
    command: grid
    args: ["secrets", "search", "{{query}}"]
    description: Search secrets by title
    placeholders:
      query:
        source: "grid secrets list 2>/dev/null | sed 's/^  //'"

  - name: secrets get
    command: grid
    args: ["secrets", "get", "{{item}}", "--reveal"]
    description: Get a secret (all fields, revealed)
    placeholders:
      item:
        source: "grid secrets list 2>/dev/null | sed 's/^  //'"

  - name: secrets get field
    command: grid
    args: ["secrets", "get", "{{item}}", "{{field}}"]
    description: Get a specific field from a secret
    placeholders:
      item:
        source: "grid secrets list 2>/dev/null | sed 's/^  //'"

  - name: secrets env
    command: grid
    args: ["secrets", "env", "{{item}}"]
    description: Export secret fields as env vars
    placeholders:
      item:
        source: "grid secrets list 2>/dev/null | sed 's/^  //'"

  - name: secrets cache status
    command: grid
    args: ["secrets", "cache", "status"]
    description: Show cache statistics

  - name: secrets cache refresh
    command: grid
    args: ["secrets", "cache", "refresh"]
    description: Refresh all cached secrets from 1Password
